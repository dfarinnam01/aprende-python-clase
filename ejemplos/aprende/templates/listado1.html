<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1 style="text-align:center">Lista de Personas</h1>

{% for persona in personas %}
    <p>{{ persona }}</p>
{% endfor %}
<hr>

<ul>
    {% for persona in personas %}
    <li>{{ persona }}</li>
{% endfor %}
</ul>

<table style="width: 100%; border:1px solid #f44336">

    <tr>
        <th>Nombre</th>
    </tr>
    {% for persona in personas %}
    <tr>
        <td>{{ persona }}</td>
    </tr>
    {% endfor %}
</table>
</body>
</html>
